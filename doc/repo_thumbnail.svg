<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Merra2BC repository thumbnail</title>
  <desc id="desc">Workflow graphic showing MERRA-2 inputs interpolated to WRF-Chem initial and boundary conditions.</desc>

  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1160" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5FBFF"/>
      <stop offset="1" stop-color="#E6F4EF"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="320" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F4C81"/>
      <stop offset="1" stop-color="#1E6CA8"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0" y1="0" x2="460" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E5A5A"/>
      <stop offset="1" stop-color="#167A6B"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="320" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#995C00"/>
      <stop offset="1" stop-color="#C98300"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B1C2C" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowHead" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1.5 1.5L10.5 6L1.5 10.5V1.5Z" fill="#205072"/>
    </marker>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1080" cy="88" r="170" fill="#B9D8E8" opacity="0.2"/>
  <circle cx="126" cy="545" r="220" fill="#9FD6C5" opacity="0.2"/>

  <text x="70" y="96" fill="#0E2A47" font-size="58" font-weight="700" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">Merra2BC</text>
  <text x="70" y="136" fill="#35556C" font-size="24" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">
    MERRA-2 chemistry to WRF-Chem IC/BC interpolation pipeline
  </text>

  <g filter="url(#softShadow)">
    <rect x="70" y="186" width="330" height="368" rx="20" fill="url(#inputGrad)"/>
    <rect x="475" y="186" width="330" height="368" rx="20" fill="url(#processGrad)"/>
    <rect x="880" y="186" width="330" height="368" rx="20" fill="url(#outputGrad)"/>
  </g>

  <text x="100" y="230" fill="#FFFFFF" font-size="28" font-weight="700" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">Inputs</text>
  <rect x="100" y="252" width="270" height="130" rx="12" fill="#FFFFFF" fill-opacity="0.13"/>
  <text x="118" y="284" fill="#E7F3FF" font-size="20" font-weight="600" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">MERRA-2 Files</text>
  <text x="118" y="314" fill="#D0E9FF" font-size="17" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">inst3_3d_aer_Nv, inst3_3d_chm_Nv</text>
  <text x="118" y="341" fill="#D0E9FF" font-size="17" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">DELP, PS, species mixing ratios</text>

  <rect x="100" y="398" width="270" height="130" rx="12" fill="#FFFFFF" fill-opacity="0.13"/>
  <text x="118" y="430" fill="#E7F3FF" font-size="20" font-weight="600" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">WRF / WPS Files</text>
  <text x="118" y="460" fill="#D0E9FF" font-size="17" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">wrfinput_d01, wrfbdy_d01</text>
  <text x="118" y="487" fill="#D0E9FF" font-size="17" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">met_em.d01.*.nc</text>

  <text x="505" y="230" fill="#FFFFFF" font-size="28" font-weight="700" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">Core Workflow</text>
  <rect x="505" y="252" width="270" height="64" rx="10" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="522" y="292" fill="#E8FFF6" font-size="20" font-weight="600" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">1. Pressure reconstruction</text>

  <rect x="505" y="330" width="270" height="64" rx="10" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="522" y="370" fill="#E8FFF6" font-size="20" font-weight="600" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">2. Horizontal interpolation</text>

  <rect x="505" y="408" width="270" height="64" rx="10" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="522" y="448" fill="#E8FFF6" font-size="20" font-weight="600" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">3. Vertical interpolation</text>

  <rect x="505" y="486" width="270" height="42" rx="10" fill="#FFFFFF" fill-opacity="0.14"/>
  <text x="522" y="513" fill="#E8FFF6" font-size="18" font-weight="600" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">4. Mapping + unit conversion + update</text>

  <text x="910" y="230" fill="#FFFFFF" font-size="28" font-weight="700" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">Outputs</text>
  <rect x="910" y="252" width="270" height="130" rx="12" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="928" y="292" fill="#FFF8E3" font-size="21" font-weight="700" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">Updated IC</text>
  <text x="928" y="324" fill="#FFEEC8" font-size="18" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">wrfinput_d01 with MERRA-2</text>
  <text x="928" y="350" fill="#FFEEC8" font-size="18" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">interpolated chemistry fields</text>

  <rect x="910" y="398" width="270" height="130" rx="12" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="928" y="438" fill="#FFF8E3" font-size="21" font-weight="700" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">Updated BC</text>
  <text x="928" y="470" fill="#FFEEC8" font-size="18" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">wrfbdy_d01 boundary fields</text>
  <text x="928" y="496" fill="#FFEEC8" font-size="18" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">and tendency variables</text>

  <path d="M406 370H466" stroke="#205072" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  <path d="M812 370H872" stroke="#205072" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowHead)"/>

  <text x="72" y="603" fill="#38546B" font-size="18" font-weight="500" font-family="'IBM Plex Sans', 'Segoe UI', Arial, sans-serif">
    Python | NumPy | SciPy | netCDF4 | WRF-Chem preprocessing utility
  </text>
</svg>
